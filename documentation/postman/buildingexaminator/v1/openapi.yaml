components:
  schemas:
    ids:
      type: array
      items:
        properties:
          id:
            type: integer
        type: object
    housingStocks:
      title: 'Housing stocks'
      description: 'An array of housing stocks'
      type: array
      items:
        $ref: '#/components/schemas/HousingStock'
    blocks:
      title: Blocks
      description: 'An array of blocks'
      type: array
      items:
        $ref: '#/components/schemas/Block'
    buildingAddresses:
      title: Addresses
      description: 'An array of addresses'
      type: array
      items:
        $ref: '#/components/schemas/BuildingAddress'
    buildingTypes:
      title: 'Building types'
      description: 'An array of building types'
      type: array
      items:
        $ref: '#/components/schemas/BuildingType'
    livingTypes:
      title: 'Living types'
      description: 'An array of living types'
      type: array
      items:
        $ref: '#/components/schemas/LivingType'
    residentialAreas:
      title: 'Residential areas'
      description: 'An array of residential areas'
      type: array
      items:
        $ref: '#/components/schemas/ResidentialArea'
    Block:
      properties:
        buildingAddresses:
          $ref: '#/components/schemas/ids'
        numberOfBuildingAddresses:
          type: integer
        buildingTypeSelection:
          $ref: '#/components/schemas/ids'
        financialNumber:
          type: string
        code:
          type: string
        name:
          type: string
        description:
          type: string
        creationTime:
          type: string
          format: date-time
        lastChangeTime:
          type: string
          format: date-time
        id:
          type: integer
      type: object
    BuildingAddress:
      properties:
        residentialArea:
          $ref: '#/components/schemas/ResidentialArea'
        buildingType:
          $ref: '#/components/schemas/BuildingType'
        livingType:
          $ref: '#/components/schemas/LivingType'
        blocks:
          $ref: '#/components/schemas/ids'
        rentalUnitNumber:
          type: string
        streetName:
          type: string
        houseNumber:
          type: integer
        addition:
          type: string
        zipcode:
          type: string
        city:
          type: string
        bagId:
          type: integer
        constructionYear:
          type: integer
        renovationYear:
          type: integer
        creationTime:
          type: string
          format: date-time
        lastChangeTime:
          type: string
          format: date-time
        id:
          type: integer
      type: object
    BuildingType:
      properties:
        buildingAddresses:
          $ref: '#/components/schemas/ids'
        buildingTypeSelections:
          $ref: '#/components/schemas/ids'
        code:
          type: string
        name:
          type: string
        description:
          type: string
        creationTime:
          type: string
          format: date-time
        lastChangeTime:
          type: string
          format: date-time
        id:
          type: integer
      type: object
    BuildingTypeSelection:
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        creationTime:
          type: string
          format: date-time
        lastChangeTime:
          type: string
          format: date-time
        id:
          type: integer
    HousingStock:
      properties:
        blocks:
          $ref: '#/components/schemas/ids'
        buildingTypes:
          $ref: '#/components/schemas/ids'
        livingTypes:
          $ref: '#/components/schemas/ids'
        buildingAddresses:
          $ref: '#/components/schemas/ids'
        housingStockOptionSet: {  }
        numberOfBlocks:
          type: integer
        numberOfBuildingAddresses:
          type: integer
        code:
          type: string
        name:
          type: string
        description:
          type: string
        creationTime:
          type: string
          format: date-time
        lastChangeTime:
          type: string
          format: date-time
        id:
          type: integer
      type: object
    LivingType:
      properties:
        buildingAddresses:
          $ref: '#/components/schemas/ids'
        code:
          type: string
        name:
          type: string
        description:
          type: string
        creationTime:
          type: string
          format: date-time
        lastChangeTime:
          type: string
          format: date-time
        id:
          type: integer
      type: object
    ResidentialArea:
      properties:
        buildingAddresses:
          $ref: '#/components/schemas/ids'
        code:
          type: string
        name:
          type: string
        description:
          type: string
        creationTime:
          type: string
          format: date-time
        lastChangeTime:
          type: string
          format: date-time
        id:
          type: integer
      type: object
externalDocs:
  url: /api/buildingexaminator/v1/documentation
