        -
          name: housingStockId
          in: path
          description: 'The id of the housing stock'
          required: true
          schema:
            type: integer
            format: int64
        -
          name: addressId
          in: path
          description: 'The id of an address'
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 'Details about an address'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BuildingAddress'
  '/housingstocks/{housingStockId}/buildingtypes':
    get:
      summary: 'Returns details about multiple building types'
