[buildingexaminator]
user = nginx
group = nginx
listen = /var/run/php-fpm/php8-fpm.sock
listen.owner = nginx
listen.group = nginx
listen.mode = 0660
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

php_flag[display_errors] = on
php_admin_value[error_log] = /var/log/php8-fpm-buildingexaminator.log
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 2G