# config/packages/rate_limiter.yaml
framework:
  rate_limiter:
    anonymous_api:
      policy: 'sliding_window'
      limit: 1000
      interval: '60 minutes'
      cache_pool: ratelimiter.anonymous_api.cache
    authenticated_api:
      policy: 'token_bucket'
      limit: 5000
      rate: { interval: '15 minutes', amount: 500 }
      cache_pool: ratelimiter.authenticated_api.cache
