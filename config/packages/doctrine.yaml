doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        types:
            enumorientation: 'App\Dbal\EnumOrientationType'
            enumglossangle: 'App\Dbal\EnumGlossAngle'
            enumconditionscore: 'App\Dbal\EnumConditionScoreType'
            enumbuildingstatus: 'App\Dbal\EnumBuildingStatusType'
            enumintendedusebasic: 'App\Dbal\EnumIntendedUseBasicType'
    orm:
        auto_generate_proxy_classes: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        enable_lazy_ghost_objects: true
        mappings:
            App:
                is_bundle: false
                type: annotation
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
