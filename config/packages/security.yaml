security:
    enable_authenticator_manager: true
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\Authentication\User:
            algorithm: auto
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Authentication\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js|fonts|assets|favicon\.ico)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: login
                check_path: login
                enable_csrf: true
            entry_point: form_login
            custom_authenticator: App\Security\LoginAuthenticator
            logout:
                path: logout
    access_control:
        - { path: '^/$', roles: PUBLIC_ACCESS }
        - { path: '^/home', roles: IS_AUTHENTICATED_FULLY }
        - { path: '^/api', roles: IS_AUTHENTICATED_FULLY }
when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
