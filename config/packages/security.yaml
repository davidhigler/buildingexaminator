security:
    enable_authenticator_manager: true
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\Authentication\User:
            algorithm: auto
    providers:
        app_user_provider:
            entity:
                class: App\Entity\Authentication\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js|fonts|assets|favicon\.ico)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
    access_control:
when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
